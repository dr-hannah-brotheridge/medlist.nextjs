<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f7f6" />
      <stop offset="100%" stop-color="#e2e9e7" />
    </linearGradient>

    <!-- Clipboard Body Gradient -->
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f9fbfb" />
    </linearGradient>

    <!-- Primary Brand Gradient (Teal/Blue-Green) -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007A87" />
      <stop offset="100%" stop-color="#005A66" />
    </linearGradient>

    <!-- Metallic Clip Gradient -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BAC8D3" />
      <stop offset="50%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>

    <!-- Soft Drop Shadow for Depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1E293B" flood-opacity="0.12" />
    </filter>
    
    <filter id="clipShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#1E293B" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Canvas Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Main Clipboard Group -->
  <g filter="url(#dropShadow)">
    <!-- Clipboard Base/Board -->
    <rect x="220" y="140" width="360" height="520" rx="24" fill="url(#boardGrad)" stroke="#E2E8F0" stroke-width="2" />

    <!-- Top Metallic Clip -->
    <g filter="url(#clipShadow)">
      <path d="M340,110 L460,110 C470,110 475,118 475,125 L470,165 C470,170 465,175 460,175 L340,175 C335,175 330,170 330,165 L325,125 C325,118 330,110 340,110 Z" fill="url(#metalGrad)" />
      <!-- Clip Fastener/Hole -->
      <circle cx="400" cy="130" r="8" fill="#64748B" opacity="0.5" />
    </g>

    <!-- Document Header Element (MedList ML Initials Badge) -->
    <g transform="translate(260, 206)">
      <rect x="0" y="0" width="54" height="54" rx="14" fill="url(#primaryGrad)" />
      <!-- Stylized "M L" Branding -->
      <path d="M14,40 L14,15 L22,27 L30,15 L30,40" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M38,16 L38,39 L46,39" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- Document Title Text -->
    <text x="330" y="234" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#1E293B" letter-spacing="0.5">MedList</text>
    <rect x="330" y="246" width="90" height="6" rx="3" fill="#94A3B8" opacity="0.5" />

    <!-- Decorative Header Rule -->
    <line x1="260" y1="285" x2="540" y2="285" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round" />

    <!-- LIST ITEMS -->

    <!-- Row 1 -->
    <g transform="translate(260, 320)">
      <!-- Checked Box -->
      <rect x="0" y="0" width="28" height="28" rx="8" fill="url(#primaryGrad)" />
      <path d="M8,14 L12,18 L20,10" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      <!-- Text Lines -->
      <rect x="44" y="4" width="180" height="10" rx="4" fill="#334155" />
      <rect x="44" y="20" width="110" height="6" rx="3" fill="#64748B" opacity="0.6" />
    </g>

    <!-- Row 2 -->
    <g transform="translate(260, 385)">
      <!-- Checked Box -->
      <rect x="0" y="0" width="28" height="28" rx="8" fill="url(#primaryGrad)" />
      <path d="M8,14 L12,18 L20,10" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      <!-- Text Lines -->
      <rect x="44" y="4" width="220" height="10" rx="4" fill="#334155" />
      <rect x="44" y="20" width="140" height="6" rx="3" fill="#64748B" opacity="0.6" />
    </g>

    <!-- Row 3 -->
    <g transform="translate(260, 450)">
      <!-- Unchecked Box -->
      <rect x="0" y="0" width="28" height="28" rx="8" fill="#ffffff" stroke="#CBD5E1" stroke-width="3" />
      <!-- Text Lines -->
      <rect x="44" y="4" width="160" height="10" rx="4" fill="#334155" />
      <rect x="44" y="20" width="90" height="6" rx="3" fill="#64748B" opacity="0.6" />
    </g>

    <!-- Row 4 -->
    <g transform="translate(260, 515)">
      <!-- Unchecked Box -->
      <rect x="0" y="0" width="28" height="28" rx="8" fill="#ffffff" stroke="#CBD5E1" stroke-width="3" />
      <!-- Text Lines -->
      <rect x="44" y="4" width="200" height="10" rx="4" fill="#334155" />
      <rect x="44" y="20" width="130" height="6" rx="3" fill="#64748B" opacity="0.6" />
    </g>

    <!-- Row 5 -->
    <g transform="translate(260, 580)">
      <!-- Unchecked Box -->
      <rect x="0" y="0" width="28" height="28" rx="8" fill="#ffffff" stroke="#CBD5E1" stroke-width="3" />
      <!-- Text Lines -->
      <rect x="44" y="4" width="140" height="10" rx="4" fill="#334155" />
      <rect x="44" y="20" width="75" height="6" rx="3" fill="#64748B" opacity="0.6" />
    </g>
  </g>
</svg>
